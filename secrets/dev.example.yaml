# Plaintext shape only. Do not put real development secrets in this file.
# Mirror this shape in the encrypted secrets/dev.yaml (SOPS + age). Each
# workspace documents the values it consumes in its own README, and
# `just dev-env-generate` derives each workspace's .env.local from the
# encrypted file. This file is seeded once and then owned by your repo —
# extend it to match your real secrets; sync will not overwrite it.
apps:
  web:
    DATABASE_URL: postgresql://punktlandung:punktlandung@127.0.0.1:15432/punktlandung_dev
    BETTER_AUTH_URL: http://localhost:3000
    BETTER_AUTH_SECRET: replace-with-a-long-random-dev-secret-32-chars-min
    # Values of a dev-only GitHub OAuth app whose callback URL is
    # http://localhost:3000/api/auth/callback/github
    GITHUB_CLIENT_ID: replace-with-dev-oauth-app-client-id
    GITHUB_CLIENT_SECRET: replace-with-dev-oauth-app-client-secret
    GITHUB_ALLOWED_LOGIN: davidvornholt
